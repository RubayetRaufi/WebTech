<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Basics Lab</title>
</head>
<body>
<h2>JavaScript Lab Task 01</h2>
<script>


alert("Welcome to Web tech Lab!");
console.log("Welcome to web tech");
document.write("<h3>Welcome to web tech</h3>");

let studentName = "Rubayet Hossain";
let studentAge = 23;
let nextYearAge = studentAge + 1;

document.write("<p>Student Name: " + studentName + "</p>");
document.write("<p>Student Age: " + studentAge + "</p>");
document.write("<p>Age Next Year: " + nextYearAge + "</p>");

let num1 = prompt("Enter first number:");
let num2 = prompt("Enter second number");

num1 = Number(num1);
num2 = Number(num2);

let sum = num1 + num2;
let difference = num1 - num2;
let product = num1 * num2;

document.write("<h3>Calculation Results</h3>");
document.write("<p>Sum: " + sum + "</p>");
document.write("<p>Difference: " + difference + "</p>");
document.write("<p>Product: " + product + "</p>");

let number = prompt("Enter a number to check Even or Odd:");
number = Number(number);

if(number % 2 == 0){
    document.write("<p>The number " + number + " is Even</p>");
}
else{
    document.write("<p>The number " + number + " is Odd</p>");
}
</script>
</body>
</html>
